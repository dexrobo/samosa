name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg build-essential python3 nodejs
      - name: Install Bazelisk
        run: |
          sudo curl -Lo /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run Formatters
        run: bazel run //tools/format

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg build-essential python3
      - name: Install Bazelisk
        run: |
          sudo curl -Lo /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run Ruff Linter
        run: bazel build --config=lint //...
      - name: Run MyPy Type Checker
        run: bazel run //tools/lint:mypy -- dex/infrastructure/shared_memory

  test-prod:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg build-essential gcc-12 g++-12
      - name: Install Bazelisk
        run: |
          sudo curl -Lo /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run Production Tests
        run: bazel test --config=prod //...

  test-sanitizers:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config: [asan, asan-dynamic, tsan, tsan-dynamic, ubsan]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg build-essential gcc-12 g++-12
      - name: Install Bazelisk
        run: |
          sudo curl -Lo /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run Sanitizer Tests (${{ matrix.config }})
        run: |
          # TSAN requires ASLR to be disabled
          if [[ "${{ matrix.config }}" == *"tsan"* ]]; then
            bazel test --config=${{ matrix.config }} --run_under="setarch $(uname -m) -R" //...
          else
            bazel test --config=${{ matrix.config }} //...
          fi
